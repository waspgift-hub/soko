<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Generate Logo</title></head>
<body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0;">
<canvas id="c" width="512" height="512"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const g=ctx.createLinearGradient(0,0,512,512);
g.addColorStop(0,'#4CAF50');g.addColorStop(1,'#2E7D32');
ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(50,50,412,412,80);ctx.fill();
ctx.fillStyle='white';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.font='bold 60px Arial';ctx.fillText('Soko',256,220);
ctx.fillText('Langu',256,320);
const a=document.createElement('a');a.download='soko_langu_logo.png';a.href=c.toDataURL();a.click();
</script></body></html>
